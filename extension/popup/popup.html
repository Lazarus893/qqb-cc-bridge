<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>QQB ↔ CC Bridge</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --fg: #e8eaed;
    --muted: #8a8f98;
    --accent: #4f8cff;
    --good: #38c172;
    --bad: #e3342f;
    --border: #2a2e36;
  }
  body {
    margin: 0; padding: 16px;
    font: 13px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    width: 320px;
  }
  h1 { font-size: 13px; margin: 0 0 12px; color: var(--muted); font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .row + .row { margin-top: 8px; }
  label { color: var(--muted); font-size: 12px; }
  input[type="text"], input[type="password"] {
    width: 100%; box-sizing: border-box;
    background: #0f1115; border: 1px solid var(--border); color: var(--fg);
    padding: 7px 9px; border-radius: 6px; font: inherit;
  }
  button {
    background: var(--accent); border: 0; color: white;
    padding: 7px 12px; border-radius: 6px; font: inherit; cursor: pointer;
  }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--fg); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .dot.good { background: var(--good); box-shadow: 0 0 6px var(--good); }
  .dot.bad  { background: var(--bad); }
  .tabs { max-height: 140px; overflow: auto; margin-top: 6px; }
  .tab { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .tab:last-child { border-bottom: 0; }
  .tab .title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .tab small { color: var(--muted); }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; background: var(--border); color: var(--muted); }
  .badge.attached { background: rgba(56, 193, 114, 0.18); color: var(--good); }
  .row-actions { display: flex; gap: 6px; }
</style>
</head>
<body>
  <h1>QQB ↔ Claude Code Bridge</h1>

  <div class="card">
    <div class="row">
      <div><span id="dot" class="dot bad"></span><span id="status">disconnected</span></div>
      <button id="reconnect" class="secondary">reconnect</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <label for="bridgeUrl">bridge url</label>
    </div>
    <input id="bridgeUrl" type="text" placeholder="ws://127.0.0.1:9528" />
    <div class="row" style="margin-top:10px">
      <label for="token">auth token</label>
    </div>
    <input id="token" type="password" placeholder="paste from bridge stderr" />
    <div class="row" style="margin-top:10px">
      <button id="save">save & reconnect</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <label>controlled tabs</label>
      <button id="takeover" class="secondary">接管当前页</button>
    </div>
    <div id="tabs" class="tabs"></div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
